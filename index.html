<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My GUNNU 💖</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e8,#fff0f7,#ffffff);
overflow-y:auto; /* Allows the page to scroll */
padding:20px 0; /* Prevents card from clipping at top/bottom when scrolling */
position:relative;
}

.card{
width:90%;
max-width:650px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
text-align:center;
z-index:5;
animation:pop .8s ease;
}

h1{
color:#ff4f88;
margin-bottom:20px;
font-size:2rem;
}

#text{
font-size:1.08rem;
line-height:1.9;
color:#555;
white-space:pre-line;
min-height:200px;
max-height:50vh; /* Keeps text box manageable on mobile */
overflow-y:auto;  /* Allows internal scrolling if text gets too long */
padding-right:5px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
}

button{
padding:14px 30px;
border:none;
border-radius:50px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

#yesBtn{
background:#ff4f88;
color:white;
box-shadow:0 8px 18px rgba(255,79,136,.3);
}

#yesBtn:hover{
transform:scale(1.08);
}

#noBtn{
background:#777;
color:white;
}

#reply{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:#ff2d73;
}

.heart,.confetti{
position:fixed; /* Changed to fixed so they don't break page scrollbars */
pointer-events:none;
}

.heart{
animation:float linear infinite;
opacity:.7;
}

.confetti{
animation:fall linear forwards;
}

@keyframes float{
from{
transform:translateY(110vh);
opacity:1;
}
to{
transform:translateY(-120px);
opacity:0;
}
}

@keyframes pop{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<h1>🥺 I'm Really Sorry, GUNNU 💖</h1>

<div id="text"></div>

<div class="buttons">
<button id="yesBtn" onclick="forgive()">Yes 💖</button>
<button id="noBtn">No 😤</button>
</div>

<div id="reply"></div>

</div>

<script>

const message=`I'm really sorry, GUNNU🥺.

I accidentally upset the most precious and adorable person in my life — you. 🥹💕

Please forgive me if I hurt you or wasted even a little of your precious time.

I promise I never meant to hurt you. ❤️

And about the kiss... I'll only accept one if you genuinely want to. I'll never ask for it or make you feel pressured again. 🤍

Your smile means more to me than you know, and I hope you'll forgive this silly person. 🌸

Every second without your smile feels incomplete... 🥹💖`;

let i=0;

function type(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(type,25);
}
}
type();

for(let i=0;i<35;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(18+Math.random()*18)+"px";
h.style.animationDuration=(5+Math.random()*5)+"s";
h.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(h);
}

function forgive(){

document.getElementById("reply").innerHTML="🥹 Thank you, GUNNU! You just made my day. 💖🌸";

for(let i=0;i<70;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=Math.random()>0.5?"💖":"🌸";

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(18+Math.random()*18)+"px";

c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3500);

}

}

const noBtn=document.getElementById("noBtn");

function moveButton(){

const x=Math.random()*(window.innerWidth-140);
const y=Math.random()*(window.innerHeight-70);

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseenter",moveButton);

noBtn.addEventListener("touchstart",function(e){

e.preventDefault();

moveButton();

});

</script>

</body>
</html>
